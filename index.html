<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Документы — Эталон</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ===== PAGE-SPECIFIC: Dashboard ===== */

        .container { max-width: 900px; margin: 0 auto; padding: 32px 32px 100px; }

        /* ===== SUMMARY TOOLBAR ===== */
        .summary-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; padding: 14px 20px;
            background: var(--white); border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
        }
        .summary-pills { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ===== CLIENT CARD (Accordion pattern) ===== */
        .client-card {
            background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
            margin-bottom: 12px; box-shadow: var(--shadow-sm); transition: all 0.25s; overflow: visible;
            position: relative;
        }
        .client-card:hover { box-shadow: var(--shadow); border-color: var(--border-hover); }
        .client-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; cursor: pointer; user-select: none; transition: background 0.2s;
        }
        .client-header:hover { background: var(--primary-10); }
        .client-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .client-card.open .client-header .accordion-toggle svg {
            transform: rotate(45deg);
            color: var(--primary);
        }
        .client-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
        .badge {
            font-size: 11px; padding: 3px 10px; border-radius: 50px; font-weight: 600; flex-shrink: 0;
            letter-spacing: -0.01em;
        }
        .badge-docs { background: var(--primary-light); color: var(--primary); }
        .badge-warn { background: var(--red-bg); color: var(--red); }
        .badge-tasks { background: var(--yellow-bg); color: var(--yellow); }
        .client-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .client-menu-wrap { position: relative; }
        .menu-btn {
            width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid transparent;
            background: none; cursor: pointer; font-size: 18px; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .menu-btn:hover { background: var(--primary-10); color: var(--primary); border-color: var(--primary-10); }

        /* Dropdown with stagger animation.
           position: fixed + координаты считаются в JS (positionDropdown) — так выпадашку
           не клипает overflow родителей и не перекрывают соседние карточки, что бы там ни
           было со стэкинг-контекстами. z-index ниже модалки (200) и тоста (300). */
        .dropdown {
            display: none; position: fixed; background: var(--white);
            border: 1.5px solid var(--border); border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg); min-width: 200px; z-index: 150; overflow: hidden; padding: 4px;
        }
        .dropdown.open {
            display: block;
            animation: dropdownOpen 0.2s ease forwards;
        }
        .dropdown.open button {
            animation: dropdownItemIn 0.2s ease forwards;
            opacity: 0;
        }
        .dropdown.open button:nth-child(1) { animation-delay: 30ms; }
        .dropdown.open button:nth-child(2) { animation-delay: 80ms; }
        .dropdown.open button:nth-child(3) { animation-delay: 130ms; }
        .dropdown button {
            display: block; width: 100%; padding: 10px 14px; text-align: left; border: none;
            background: none; font-size: 14px; cursor: pointer; color: var(--text-2);
            transition: all 0.15s; border-radius: var(--radius-xs); font-weight: 500;
            font-family: inherit;
        }
        .dropdown button:hover { background: var(--primary-10); color: var(--primary); }
        /* Карточка с открытым меню поднимается выше соседних — иначе выпадашка прячется под следующей карточкой */
        .client-card.menu-open { z-index: 30; }
        .client-card:has(.dropdown.open) { z-index: 30; }

        /* ===== CLIENT BODY (animated accordion) ===== */
        .client-body {
            max-height: 0; overflow: hidden;
            border-top: 0px solid transparent;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-top 0.2s;
        }
        .client-card.open .client-body {
            max-height: 5000px;
            border-top: 1.5px solid var(--border);
        }
        .client-section { padding: 20px 24px; }
        .client-section + .client-section { border-top: 1px solid var(--border); }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); display: flex; align-items: center; gap: 8px;
        }
        .section-add-btn {
            font-size: 13px; color: var(--primary); background: none; border: none;
            cursor: pointer; font-weight: 600; padding: 5px 12px; border-radius: 50px;
            transition: all 0.2s; font-family: inherit;
        }
        .section-add-btn:hover { background: var(--primary-10); }

        /* ===== DOCUMENT TREE (File Tree Explorer pattern) ===== */
        .tree-container {
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            overflow: hidden; background: var(--white);
        }
        .tree-titlebar {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; background: var(--bg); border-bottom: 1px solid var(--border);
            font-size: 12px; color: var(--text-muted); font-weight: 500;
        }
        .tree-dot { width: 8px; height: 8px; border-radius: 50%; }
        .tree-dot-red { background: #FF605C; }
        .tree-dot-yellow { background: #FFBD44; }
        .tree-dot-green { background: #00CA4E; }
        .tree-titlebar-text { margin-left: 4px; }

        .doc-group { margin-bottom: 0; }
        .doc-group:last-child .doc-row:last-child { border-bottom: none; }

        .doc-row {
            display: flex; align-items: center; padding: 10px 16px; gap: 10px;
            transition: background 0.15s; border-bottom: 1px solid var(--border);
            position: relative;
        }
        .doc-row:hover { background: var(--bg); }

        /* Tree connector lines */
        .doc-children { background: var(--bg); }
        .doc-children .doc-row { padding-left: 44px; }
        .doc-child-wrap { position: relative; }
        .doc-child-wrap::before {
            content: ''; position: absolute; left: 26px; top: 0; bottom: 50%; width: 1px;
            background: var(--border-hover);
        }
        .doc-child-wrap:not(:last-child)::after {
            content: ''; position: absolute; left: 26px; top: 50%; bottom: 0; width: 1px;
            background: var(--border-hover);
        }
        .doc-children .doc-row::before {
            content: ''; position: absolute; left: 26px; top: 50%; width: 10px; height: 1px;
            background: var(--border-hover);
        }
        .doc-children .doc-children {
            background: var(--white);
        }
        .doc-children .doc-children .doc-row { padding-left: 66px; }
        .doc-children .doc-children .doc-row::before { left: 48px; }
        .doc-children .doc-children .doc-child-wrap::before,
        .doc-children .doc-children .doc-child-wrap::after { left: 48px; }

        /* Document type icon */
        .doc-type-icon {
            width: 22px; height: 22px;
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .doc-type-icon svg { width: 12px; height: 12px; }
        .doc-type-icon.contract { background: var(--primary-10); color: var(--primary); }
        .doc-type-icon.amendment { background: var(--orange-bg); color: var(--orange); }
        .doc-type-icon.act { background: var(--green-bg); color: var(--green); }

        .doc-type {
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
            padding: 4px 8px; border-radius: 5px; flex-shrink: 0; line-height: 1;
        }
        .doc-type-contract { background: var(--primary-light); color: var(--primary); }
        .doc-type-amendment { background: var(--yellow-bg); color: #B87D14; }
        .doc-type-act { background: var(--green-bg); color: var(--green); }
        .doc-desc {
            flex: 1; font-size: 14px; font-weight: 500; min-width: 0;
            white-space: normal; word-break: break-word; color: var(--text-2);
            letter-spacing: -0.01em; line-height: 1.4;
        }
        .doc-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
        .doc-status {
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 50px;
            border: none; background: none; transition: all 0.2s; user-select: none;
            width: 130px; justify-content: center; flex-shrink: 0; font-family: inherit;
        }
        .doc-status.signed { color: var(--green); background: var(--green-bg); }
        .doc-status.unsigned { color: var(--red); background: var(--red-bg); }
        .doc-status:hover { transform: scale(1.04); box-shadow: var(--shadow-xs); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .signed .status-dot { background: var(--green); }
        .unsigned .status-dot { background: var(--red); }
        .doc-storage {
            font-size: 12px; padding: 4px 12px; border-radius: 50px;
            background: var(--bg); color: var(--text-muted); font-weight: 600;
            flex-shrink: 0; cursor: pointer; user-select: none; transition: all 0.2s;
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 5px;
            width: 90px; justify-content: center;
        }
        .doc-storage:hover { transform: scale(1.04); box-shadow: var(--shadow-xs); }
        .storage-edo { color: var(--green); background: var(--green-bg); border-color: var(--green-bg); }
        .storage-edo:hover { background: #D9F5E5; }
        .storage-paper { color: var(--text-muted); }
        .storage-paper:hover { background: var(--primary-light); border-color: var(--primary-light); }
        .doc-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .doc-row:hover .doc-actions { opacity: 1; }
        .small-btn {
            width: 28px; height: 28px; border: none; background: none; cursor: pointer;
            border-radius: 50%; font-size: 13px; color: var(--text-muted);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .small-btn:hover { background: var(--primary-10); color: var(--primary); transform: scale(1.1); }
        .small-btn.del:hover { background: var(--red-bg); color: var(--red); }

        /* ===== TASKS ===== */
        .task-list { display: flex; flex-direction: column; gap: 6px; }
        .task-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--white);
            transition: all 0.2s;
        }
        .task-item:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }
        .task-item.pinned { border-color: var(--yellow); background: var(--yellow-bg); }
        .task-pin {
            width: 26px; height: 26px; border: none; background: none; cursor: pointer;
            flex-shrink: 0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); opacity: 0.35; transition: all 0.2s;
        }
        .task-pin:hover { opacity: 1; background: var(--yellow-bg); color: var(--yellow); }
        .task-item.pinned .task-pin { opacity: 1; color: var(--yellow); }
        .task-title {
            flex: 1; font-size: 14px; font-weight: 500; min-width: 0; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; color: var(--text-2);
        }
        .task-title.done { text-decoration: line-through; color: var(--text-muted); }
        .task-due { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
        .task-due.overdue { color: var(--red); font-weight: 600; }
        .task-status-btn {
            font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 50px;
            border: none; cursor: pointer; flex-shrink: 0; transition: all 0.2s;
            letter-spacing: -0.01em; font-family: inherit;
        }
        .task-status-btn:hover { transform: scale(1.04); box-shadow: var(--shadow-xs); }
        .task-status-todo { background: var(--primary-light); color: var(--primary); }
        .task-status-in_progress { background: var(--yellow-bg); color: var(--yellow); }
        .task-status-done { background: var(--green-bg); color: var(--green); }
        .task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .task-item:hover .task-actions { opacity: 1; }

        /* ===== NOTES ===== */
        .client-notes {
            font-size: 13px; color: var(--text-muted); padding: 14px 24px;
            border-top: 1px solid var(--border); background: var(--bg);
        }
        .client-notes b { color: var(--text-2); font-weight: 600; }

        /* ===== ARCHIVE ===== */
        .archive-divider {
            display: flex; align-items: center; gap: 16px; margin: 40px 0 20px;
            cursor: pointer; user-select: none;
        }
        .archive-divider:hover .archive-label { color: var(--text-2); border-color: var(--border-hover); }
        .archive-line { flex: 1; height: 1px; background: var(--border); }
        .archive-label {
            font-size: 13px; font-weight: 600; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px; transition: all 0.2s;
            padding: 6px 14px; border-radius: 50px; background: var(--white);
            border: 1px solid var(--border);
        }
        .archive-arrow {
            transition: transform 0.3s ease;
            display: flex; align-items: center;
        }
        .archive-section { display: none; }
        .archive-section.open { display: block; }
        .archive-card { opacity: 0.6; transition: all 0.2s; }
        .archive-card:hover { opacity: 1; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container { padding: 16px 12px 80px; }
            .summary-bar {
                flex-direction: column; gap: 12px; align-items: stretch;
                padding: 14px 16px;
            }
            .summary-pills { gap: 6px; }
            .btn-primary { width: 100%; justify-content: center; text-align: center; }
            .client-card { border-radius: 12px; }
            .client-header { padding: 14px 16px; }
            .client-left { gap: 8px; flex-wrap: wrap; }
            .client-name { font-size: 14px; }
            .badge { font-size: 10px; padding: 2px 8px; }
            .client-section { padding: 14px 16px; }
            .tree-titlebar { display: none; }
        }

        @media (max-width: 480px) {
            .container { padding: 12px 8px 80px; }
            .summary-bar { padding: 12px 12px; border-radius: 12px; }
            .btn-primary { padding: 12px 20px; font-size: 14px; border-radius: 999px; }
            .client-card { margin-bottom: 10px; border-radius: 12px; }
            .client-header { padding: 12px 14px; }
            .client-left { gap: 6px; }
            .client-name { font-size: 14px; max-width: 140px; }
            .badge { font-size: 9px; padding: 2px 6px; }
            .menu-btn { width: 30px; height: 30px; }
            .client-section { padding: 12px 10px; }
            .section-title { font-size: 10px; }
            .section-add-btn { font-size: 12px; }

            /* Documents: stack layout for mobile */
            .doc-row {
                padding: 10px 10px; gap: 6px;
                flex-wrap: wrap;
            }
            .doc-type-icon { width: 18px; height: 18px; }
            .doc-type { font-size: 9px; padding: 3px 6px; }
            .doc-desc {
                font-size: 13px;
                white-space: normal;
                overflow: visible;
                text-overflow: unset;
                flex-basis: 100%;
                order: 10;
                margin-top: 2px;
                word-break: break-word;
                line-height: 1.4;
            }
            .doc-date { display: none; }
            .doc-status { width: auto; font-size: 10px; padding: 3px 8px; }
            .doc-storage { width: auto; font-size: 10px; padding: 3px 6px; }
            .doc-storage svg { width: 14px; height: 14px; }
            .doc-actions { opacity: 1; }
            .small-btn { width: 32px; height: 32px; font-size: 16px; }
            .doc-children .doc-row { padding-left: 24px; }
            .doc-children .doc-row::before { left: 14px; }
            .doc-child-wrap::before,
            .doc-child-wrap:not(:last-child)::after { left: 14px; }
            .doc-children .doc-children .doc-row { padding-left: 38px; }
            .doc-children .doc-children .doc-row::before { left: 28px; }
            .doc-children .doc-children .doc-child-wrap::before,
            .doc-children .doc-children .doc-child-wrap::after { left: 28px; }

            /* Tasks */
            .task-item { padding: 10px 12px; gap: 6px; border-radius: 8px; }
            .task-pin { width: 28px; height: 28px; }
            .task-title { font-size: 13px; }
            .task-status-btn { font-size: 10px; padding: 3px 8px; }
            .task-due { font-size: 10px; }
            .task-actions { opacity: 1; }
            .task-actions .small-btn { width: 32px; height: 32px; }
            .client-notes { padding: 10px 14px; font-size: 12px; }
            .archive-divider { margin: 28px 0 14px; }
            .archive-label { font-size: 12px; padding: 5px 12px; }
            .dropdown { min-width: 160px; }
            .dropdown button { padding: 10px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen" style="display:none">
    <div class="auth-card">
        <img src="logo.png" alt="Эталон" class="auth-logo">
        <h2>Документы</h2>
        <p id="authSubtitle">Войдите в аккаунт</p>
        <form onsubmit="event.preventDefault();handleAuthSubmit()">
            <input type="email" id="authEmail" placeholder="Email" autocomplete="email" style="margin-bottom:10px">
            <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password">
            <button type="submit" class="auth-btn" id="authSubmitBtn" style="margin-top:16px">Войти</button>
        </form>
        <div id="authError" class="auth-error"></div>
        <div id="authLinks" style="margin-top:16px;font-size:13px;color:var(--text-muted)">
            <span onclick="showResetMode()" id="authForgot" style="cursor:pointer;color:var(--primary)">Забыли пароль?</span>
            <span id="authLinkDot" style="margin:0 8px">·</span>
            <span onclick="toggleAuthMode()" id="authToggle" style="cursor:pointer;color:var(--primary)">Создать аккаунт</span>
        </div>
    </div>
</div>

<div id="app" style="display:none">
    <header class="header">
        <img src="logo.png" alt="Эталон" class="header-logo">
        <nav class="header-nav">
            <a href="index.html" class="active">Документы</a>
            <a href="generator.html">Генератор</a>
        </nav>
        <div class="header-actions">
            <button class="header-btn" onclick="exportToCSV()" title="Экспорт в Google Таблицы (CSV)">
                <i data-lucide="file-spreadsheet" style="width:16px;height:16px;stroke-width:2"></i>
                <span>Экспорт</span>
            </button>
            <button class="header-btn logout" onclick="logout()" title="Выйти из системы">Выйти</button>
        </div>
    </header>

    <div class="container">
        <div class="summary-bar">
            <div class="summary-pills" id="summary"></div>
            <button class="btn-primary" onclick="openClientModal()">+ Новый клиент</button>
        </div>
        <div id="clientsList"></div>

        <div id="unlinkedTasks"></div>

        <div class="archive-divider" onclick="toggleArchive()">
            <span class="archive-line"></span>
            <span class="archive-label">
                <span class="archive-arrow" id="archiveArrow"><i data-lucide="chevron-right" style="width:14px;height:14px;stroke-width:2.5"></i></span>
                Архив <span id="archiveCount"></span>
            </span>
            <span class="archive-line"></span>
        </div>
        <div class="archive-section" id="archiveSection"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalContent"></div>
</div>
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box" id="confirmBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== FIREBASE INIT ===== */
firebase.initializeApp({
    apiKey: "AIzaSyA9YoT7_jTwJLCnfXddkfJsYYN1ahr6zZ8",
    authDomain: "etalon-docs.firebaseapp.com",
    projectId: "etalon-docs",
    storageBucket: "etalon-docs.firebasestorage.app",
    messagingSenderId: "380746796562",
    appId: "1:380746796562:web:78c8092ced0e51e1c792cb"
});
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;
let unsubFirestore = null;

function genId(p) { return p + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
function getDefault() { return { version: 1, clients: [], tasks: [] }; }

let data = getDefault();
let saving = false;

async function save() {
    if (!currentUser || saving) return;
    saving = true;
    try {
        await db.collection('users').doc(currentUser.uid).set({
            clients: data.clients,
            tasks: data.tasks,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) { console.error('Save error:', e); toast('Ошибка сохранения'); }
    saving = false;
}

async function loadFromFirestore() {
    if (!currentUser) return;
    try {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if (doc.exists) {
            const d = doc.data();
            data.clients = d.clients || [];
            data.tasks = d.tasks || [];
            if (data.clients.length === 0) {
                const seed = getSeedData();
                data.clients = seed.clients;
                data.tasks = seed.tasks;
                await save();
            }
        } else {
            const seed = getSeedData();
            data.clients = seed.clients;
            data.tasks = seed.tasks;
            await save();
        }
    } catch(e) { console.error('Load error:', e); toast('Ошибка загрузки'); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
}
function toast(m) {
    const el = document.getElementById('toast');
    el.textContent = m; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}
function pl(n, o, f, m) {
    const a = Math.abs(n) % 100, l = a % 10;
    if (a > 10 && a < 20) return m;
    if (l > 1 && l < 5) return f;
    return l === 1 ? o : m;
}

/* ===== AUTH ===== */
let authMode = 'login';

function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg; el.style.display = 'block';
}

function setAuthMode(mode) {
    authMode = mode;
    document.getElementById('authError').style.display = 'none';
    const pw = document.getElementById('authPassword');
    const sub = document.getElementById('authSubtitle');
    const btn = document.getElementById('authSubmitBtn');
    const toggle = document.getElementById('authToggle');
    const forgot = document.getElementById('authForgot');
    const dot = document.getElementById('authLinkDot');

    if (mode === 'login') {
        sub.textContent = 'Войдите в аккаунт';
        btn.textContent = 'Войти';
        pw.style.display = 'block';
        toggle.textContent = 'Создать аккаунт';
        forgot.style.display = 'inline';
        dot.style.display = 'inline';
    } else if (mode === 'register') {
        sub.textContent = 'Создайте аккаунт';
        btn.textContent = 'Зарегистрироваться';
        pw.style.display = 'block';
        toggle.textContent = 'Уже есть аккаунт? Войти';
        forgot.style.display = 'none';
        dot.style.display = 'none';
    } else if (mode === 'reset') {
        sub.textContent = 'Введите email для сброса пароля';
        btn.textContent = 'Отправить ссылку';
        pw.style.display = 'none';
        toggle.textContent = 'Вернуться ко входу';
        forgot.style.display = 'none';
        dot.style.display = 'none';
    }
}

function toggleAuthMode() {
    if (authMode === 'register' || authMode === 'reset') setAuthMode('login');
    else setAuthMode('register');
}

function showResetMode() { setAuthMode('reset'); }

async function handleAuthSubmit() {
    if (authMode === 'reset') { await resetPassword(); return; }
    const email = document.getElementById('authEmail').value.trim();
    const pw = document.getElementById('authPassword').value;
    if (!email || !pw) { showAuthError('Введите email и пароль'); return; }
    if (authMode === 'register' && pw.length < 6) { showAuthError('Пароль минимум 6 символов'); return; }
    try {
        if (authMode === 'register') {
            await auth.createUserWithEmailAndPassword(email, pw);
        } else {
            await auth.signInWithEmailAndPassword(email, pw);
        }
    } catch(e) {
        const msgs = {
            'auth/user-not-found': 'Пользователь не найден',
            'auth/wrong-password': 'Неверный пароль',
            'auth/invalid-email': 'Неверный email',
            'auth/invalid-credential': 'Неверный email или пароль',
            'auth/too-many-requests': 'Слишком много попыток, попробуйте позже',
            'auth/email-already-in-use': 'Этот email уже зарегистрирован',
            'auth/weak-password': 'Пароль слишком простой (мин. 6 символов)'
        };
        showAuthError(msgs[e.code] || e.message);
    }
}

async function resetPassword() {
    const email = document.getElementById('authEmail').value.trim();
    if (!email) { showAuthError('Введите email'); return; }
    try {
        await auth.sendPasswordResetEmail(email);
        document.getElementById('authError').style.display = 'none';
        toast('Ссылка для сброса отправлена на ' + email);
        setAuthMode('login');
    } catch(e) {
        const msgs = {
            'auth/user-not-found': 'Пользователь с таким email не найден',
            'auth/invalid-email': 'Неверный email'
        };
        showAuthError(msgs[e.code] || e.message);
    }
}

function logout() { auth.signOut(); }

async function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadFromFirestore();
    render();
}

function showAuth() {
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('authError').style.display = 'none';
}

auth.onAuthStateChanged(async (user) => {
    currentUser = user;
    if (user) {
        await showApp();
    } else {
        data = getDefault();
        showAuth();
    }
});

/* ===== STATE ===== */
const expanded = new Set();
let archiveOpen = false;

function toggleExpand(id) {
    expanded.has(id) ? expanded.delete(id) : expanded.add(id);
    render();
}

function toggleArchive() {
    archiveOpen = !archiveOpen;
    document.getElementById('archiveSection').classList.toggle('open', archiveOpen);
    const arrow = document.getElementById('archiveArrow');
    arrow.style.transform = archiveOpen ? 'rotate(90deg)' : '';
}

/* ===== RENDER ===== */
function render() {
    const active = data.clients.filter(c => c.status === 'active');
    const archived = data.clients.filter(c => c.status === 'archived');
    const unsigned = active.reduce((s, c) => s + c.documents.filter(d => !d.signed).length, 0);
    const totalDocs = active.reduce((s, c) => s + c.documents.length, 0);
    const activeTasks = data.tasks.filter(t => t.column !== 'done').length;

    let pills = `<span class="stat-pill"><b>${active.length}</b> ${pl(active.length,'клиент','клиента','клиентов')}</span>`;
    if (totalDocs > 0 && unsigned > 0) pills += `<span class="stat-pill warn"><b>${unsigned}</b> неподписан.</span>`;
    if (activeTasks > 0) pills += `<span class="stat-pill tasks"><b>${activeTasks}</b> ${pl(activeTasks,'задача','задачи','задач')}</span>`;
    document.getElementById('summary').innerHTML = pills;

    const cl = document.getElementById('clientsList');
    if (active.length === 0) {
        cl.innerHTML = `<div class="empty"><div class="empty-icon">&#128203;</div><h3>Нет клиентов</h3><p>Добавьте первого клиента</p></div>`;
    } else {
        cl.innerHTML = active.map(c => renderCard(c, false)).join('');
    }

    // Unlinked tasks
    const unlinked = data.tasks.filter(t => !t.clientId);
    const utEl = document.getElementById('unlinkedTasks');
    if (unlinked.length > 0) {
        const pinned = unlinked.filter(t => t.pinned);
        const unpinned = unlinked.filter(t => !t.pinned).sort((a,b) => {
            const o = {todo:0,in_progress:1,done:2};
            return (o[a.column]||0)-(o[b.column]||0);
        });
        const sorted = [...pinned, ...unpinned];
        utEl.innerHTML = `<div class="client-card open" style="border-color:var(--primary-light)">
            <div class="client-body" style="max-height:5000px;border-top:1.5px solid var(--border)">
                <div class="client-section">
                    <div class="section-header">
                        <span class="section-title">
                            <span class="icon-badge icon-badge-blue"><i data-lucide="list-checks" style="width:14px;height:14px;stroke-width:2"></i></span>
                            Общие задачи
                        </span>
                        <button class="section-add-btn" onclick="openTaskModal(null)">+ Добавить</button>
                    </div>
                    <div class="task-list">${sorted.map(t => renderTask(t)).join('')}</div>
                </div>
            </div>
        </div>`;
    } else {
        utEl.innerHTML = '';
    }

    document.getElementById('archiveCount').textContent = `(${archived.length})`;
    const as = document.getElementById('archiveSection');
    if (archived.length === 0) {
        as.innerHTML = `<div class="empty"><div class="empty-icon">&#128451;</div><h3>Архив пуст</h3><p>Сюда попадают клиенты с завершёнными отношениями</p></div>`;
    } else {
        as.innerHTML = archived.map(c => renderCard(c, true)).join('');
    }

    lucide.createIcons();
}

function renderCard(c, isArch) {
    const isOpen = expanded.has(c.id);
    const unsigned = c.documents.filter(d => !d.signed).length;
    const tasks = data.tasks.filter(t => t.clientId === c.id && t.column !== 'done');

    // Determine icon badge color
    let badgeClass = 'icon-badge-blue';
    if (unsigned > 0) badgeClass = 'icon-badge-red';
    else if (c.documents.length > 0 && unsigned === 0) badgeClass = 'icon-badge-green';

    let badges = '';
    if (c.documents.length > 0) badges += `<span class="badge badge-docs">${c.documents.length} док</span>`;
    if (unsigned > 0) badges += `<span class="badge badge-warn">${unsigned} не подп.</span>`;
    if (tasks.length > 0) badges += `<span class="badge badge-tasks">${tasks.length} задач</span>`;

    const archDate = isArch && c.archivedAt ? `<span style="font-size:12px;color:var(--text-muted);margin-left:8px">Архив с ${fmtDate(c.archivedAt)}</span>` : '';

    const menu = isArch
        ? `<button class="btn-outline" onclick="event.stopPropagation();restoreClient('${c.id}')">Восстановить</button>`
        : `<div class="client-menu-wrap">
            <button class="menu-btn" onclick="event.stopPropagation();toggleDD(this)" title="Меню">
                <i data-lucide="ellipsis-vertical" style="width:16px;height:16px;stroke-width:2"></i>
            </button>
            <div class="dropdown">
                <button onclick="openClientModal('${c.id}')"><i data-lucide="pencil" style="width:14px;height:14px;stroke-width:2;margin-right:8px;vertical-align:-2px"></i>Редактировать</button>
                <button onclick="archiveClient('${c.id}')"><i data-lucide="archive" style="width:14px;height:14px;stroke-width:2;margin-right:8px;vertical-align:-2px"></i>В архив</button>
            </div>
        </div>`;

    // Documents
    const { roots, childrenOf } = buildTree(c.documents);
    const docsHtml = roots.map(r => renderDocGroup(c.id, r, childrenOf, isArch)).join('');

    // Tasks
    const clientTasks = data.tasks.filter(t => t.clientId === c.id);
    const pinned = clientTasks.filter(t => t.pinned).sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    const unpinned = clientTasks.filter(t => !t.pinned).sort((a,b) => {
        const order = { todo: 0, in_progress: 1, done: 2 };
        return (order[a.column]||0) - (order[b.column]||0) || new Date(a.createdAt) - new Date(b.createdAt);
    });
    const sortedTasks = [...pinned, ...unpinned];
    const tasksHtml = sortedTasks.map(t => renderTask(t)).join('');

    const notesHtml = c.notes ? `<div class="client-notes"><b>Заметки:</b> ${esc(c.notes)}</div>` : '';

    // Tree container for documents
    const treeContent = docsHtml
        ? `<div class="tree-container">
            <div class="tree-titlebar">
                <span class="tree-dot tree-dot-red"></span>
                <span class="tree-dot tree-dot-yellow"></span>
                <span class="tree-dot tree-dot-green"></span>
                <span class="tree-titlebar-text">документы</span>
            </div>
            ${docsHtml}
        </div>`
        : '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">Нет документов</div>';

    const body = `<div class="client-body">
        <div class="client-section">
            <div class="section-header">
                <span class="section-title">
                    <span class="icon-badge icon-badge-blue"><i data-lucide="folder-open" style="width:14px;height:14px;stroke-width:2"></i></span>
                    Документы
                </span>
                ${!isArch ? `<button class="section-add-btn" onclick="openDocModal('${c.id}')">+ Добавить</button>` : ''}
            </div>
            ${treeContent}
        </div>
        <div class="client-section">
            <div class="section-header">
                <span class="section-title">
                    <span class="icon-badge icon-badge-orange"><i data-lucide="check-square" style="width:14px;height:14px;stroke-width:2"></i></span>
                    Задачи
                </span>
                ${!isArch ? `<button class="section-add-btn" onclick="openTaskModal('${c.id}')">+ Добавить</button>` : ''}
            </div>
            ${sortedTasks.length > 0 ? `<div class="task-list">${tasksHtml}</div>` : '<div style="font-size:13px;color:var(--text-muted);padding:8px 0">Нет задач</div>'}
        </div>
        ${notesHtml}
    </div>`;

    return `<div class="client-card ${isOpen ? 'open' : ''} ${isArch ? 'archive-card' : ''}" data-id="${c.id}">
        <div class="client-header" onclick="toggleExpand('${c.id}')">
            <div class="client-left">
                <span class="accordion-toggle">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="7" y1="2" x2="7" y2="12"/>
                        <line x1="2" y1="7" x2="12" y2="7"/>
                    </svg>
                </span>
                <span class="icon-badge ${badgeClass}" style="width:28px;height:28px;border-radius:8px">
                    <i data-lucide="building-2" style="width:14px;height:14px;stroke-width:2"></i>
                </span>
                <span class="client-name">${esc(c.name)}</span>
                ${archDate}
                ${badges}
            </div>
            <div class="client-right">${menu}</div>
        </div>
        ${body}
    </div>`;
}

/* ===== DOC TREE ===== */
function buildTree(docs) {
    const byId = {}; docs.forEach(d => byId[d.id] = d);
    const roots = [], childrenOf = {};
    docs.forEach(d => {
        if (!d.parentId || !byId[d.parentId]) roots.push(d);
        else { if (!childrenOf[d.parentId]) childrenOf[d.parentId] = []; childrenOf[d.parentId].push(d); }
    });
    const s = a => a.sort((x,y) => new Date(x.createdAt) - new Date(y.createdAt));
    s(roots); Object.values(childrenOf).forEach(s);
    return { roots, childrenOf };
}

function renderDocGroup(cid, doc, childrenOf, isArch) {
    const ch = childrenOf[doc.id] || [];
    let chHtml = '';
    if (ch.length > 0) {
        const items = ch.map(c => {
            const gc = childrenOf[c.id] || [];
            let gcH = '';
            if (gc.length > 0) {
                gcH = `<div class="doc-children">${gc.map(g => `<div class="doc-child-wrap">${renderDocRow(cid,g,isArch)}</div>`).join('')}</div>`;
            }
            return `<div class="doc-child-wrap">${renderDocRow(cid,c,isArch)}${gcH}</div>`;
        }).join('');
        chHtml = `<div class="doc-children">${items}</div>`;
    }
    return `<div class="doc-group">${renderDocRow(cid,doc,isArch)}${chHtml}</div>`;
}

function renderDocRow(cid, doc, isArch) {
    const sc = doc.signed ? 'signed' : 'unsigned';
    const sl = doc.signed ? 'Подписано' : 'Не подписано';
    const storageIcon = doc.storage === 'edo'
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" stroke="#22AD5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="#9598AC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const st = doc.storage === 'edo' ? 'ЭДО' : 'Бумага';
    const tl = { contract:'Договор', amendment:'ДС', act:'Акт' }[doc.type] || '';
    const tc = `doc-type-${doc.type}`;
    const typeIconClass = doc.type;
    const typeIcons = { contract: 'file-text', amendment: 'file-pen', act: 'file-check' };
    const typeIcon = typeIcons[doc.type] || 'file';
    const dt = doc.createdAt ? fmtDate(doc.createdAt) : '';
    const acts = !isArch ? `<div class="doc-actions">
        <button class="small-btn" onclick="event.stopPropagation();openDocModal('${cid}','${doc.id}')" title="Редактировать"><i data-lucide="pencil" style="width:13px;height:13px;stroke-width:2"></i></button>
        <button class="small-btn del" onclick="event.stopPropagation();deleteDoc('${cid}','${doc.id}')" title="Удалить"><i data-lucide="trash-2" style="width:13px;height:13px;stroke-width:2"></i></button>
    </div>` : '';
    return `<div class="doc-row">
        <span class="doc-type-icon ${typeIconClass}"><i data-lucide="${typeIcon}" style="width:12px;height:12px;stroke-width:2.5"></i></span>
        <span class="doc-type ${tc}">${tl}</span>
        <span class="doc-desc" title="${esc(doc.description)}">${esc(doc.description)}</span>
        <span class="doc-date">${dt}</span>
        <button class="doc-status ${sc}" onclick="event.stopPropagation();toggleSigned('${cid}','${doc.id}')"><span class="status-dot"></span>${sl}</button>
        <span class="doc-storage ${doc.storage === 'edo' ? 'storage-edo' : 'storage-paper'}" onclick="event.stopPropagation();toggleStorage('${cid}','${doc.id}')">${storageIcon}${st}</span>
        ${acts}
    </div>`;
}

/* ===== TASK RENDER ===== */
function renderTask(t) {
    const statusLabels = { todo:'Сделать', in_progress:'В работе', done:'Готово' };
    const sl = statusLabels[t.column] || t.column;
    let due = '';
    if (t.dueDate) {
        const over = new Date(t.dueDate) < new Date() && t.column !== 'done';
        due = `<span class="task-due ${over?'overdue':''}">${fmtDate(t.dueDate)}</span>`;
    }
    return `<div class="task-item ${t.pinned ? 'pinned' : ''}">
        <button class="task-pin" onclick="togglePin('${t.id}')" title="${t.pinned ? 'Открепить' : 'Закрепить'}">
            <i data-lucide="pin" style="width:14px;height:14px;stroke-width:2"></i>
        </button>
        <span class="task-title ${t.column==='done'?'done':''}" title="${esc(t.description||'')}">${esc(t.title)}</span>
        ${due}
        <button class="task-status-btn task-status-${t.column}" onclick="cycleTaskStatus('${t.id}')" title="Нажмите чтобы сменить статус">${sl}</button>
        <div class="task-actions">
            <button class="small-btn" onclick="openTaskModal(null,'${t.id}')" title="Редактировать"><i data-lucide="pencil" style="width:13px;height:13px;stroke-width:2"></i></button>
            <button class="small-btn del" onclick="deleteTask('${t.id}')" title="Удалить"><i data-lucide="trash-2" style="width:13px;height:13px;stroke-width:2"></i></button>
        </div>
    </div>`;
}

/* ===== CLIENT CRUD ===== */
function openClientModal(editId) {
    const c = editId ? data.clients.find(x => x.id === editId) : null;
    document.getElementById('modalContent').innerHTML = `
        <form onsubmit="event.preventDefault();saveClient('${editId||''}')">
        <h3>${c ? 'Редактировать клиента' : 'Новый клиент'}</h3>
        <div class="form-group"><label>Название компании</label>
            <input type="text" id="fName" value="${c ? esc(c.name) : ''}" placeholder="ООО Компания"></div>
        <div class="form-group"><label>Заметки</label>
            <textarea id="fNotes" placeholder="Контакт, телефон...">${c ? esc(c.notes||'') : ''}</textarea></div>
        <div class="modal-actions">
            <button type="button" class="btn-ghost" onclick="closeModal()">Отмена</button>
            <button type="submit" class="btn-primary">${c ? 'Сохранить' : 'Добавить'}</button>
        </div>
        </form>`;
    openModal();
    setTimeout(() => document.getElementById('fName')?.focus(), 100);
}

function saveClient(eid) {
    const name = document.getElementById('fName').value.trim();
    const notes = document.getElementById('fNotes').value.trim();
    if (!name) { toast('Введите название'); return; }
    if (eid) {
        const c = data.clients.find(x => x.id === eid);
        if (c) { c.name = name; c.notes = notes; }
    } else {
        const id = genId('c');
        data.clients.push({ id, name, status:'active', notes, createdAt: new Date().toISOString(), archivedAt:null, documents:[] });
        expanded.add(id);
    }
    save(); closeModal(); render();
    toast(eid ? 'Клиент обновлён' : 'Клиент добавлен');
}

function archiveClient(id) {
    const c = data.clients.find(x => x.id === id);
    if (c) { c.status = 'archived'; c.archivedAt = new Date().toISOString(); }
    expanded.delete(id); save(); render();
    toast('Клиент в архиве');
}

function restoreClient(id) {
    const c = data.clients.find(x => x.id === id);
    if (c) { c.status = 'active'; c.archivedAt = null; }
    save(); render(); toast('Клиент восстановлен');
}

        </form>`;

}

function docTypeChanged() {
    const t = document.getElementById('fType').value;
    document.getElementById('fParentWrap').style.display = t === 'contract' ? 'none' : 'block';
}

function saveDoc(cid, did) {
    const cl = data.clients.find(x => x.id === cid); if (!cl) return;
    const type = document.getElementById('fType').value;
    const desc = document.getElementById('fDesc').value.trim();
    const storage = document.getElementById('fStorage').value;
    const parentId = type !== 'contract' ? (document.getElementById('fParent').value || null) : null;
    if (!desc) { toast('Введите описание'); return; }
    if (did) {
        const d = cl.documents.find(x => x.id === did);
        if (d) { d.type = type; d.description = desc; d.storage = storage; d.parentId = parentId; }
    } else {
        cl.documents.push({ id:genId('d'), type, description:desc, signed:false, storage, parentId, createdAt:new Date().toISOString() });
    }
    save(); closeModal(); render(); toast(did ? 'Документ обновлён' : 'Документ добавлен');
}

function toggleSigned(cid, did) {
    const cl = data.clients.find(x => x.id === cid); if (!cl) return;
    const d = cl.documents.find(x => x.id === did);
    if (d) d.signed = !d.signed;
    save(); render();
}

function toggleStorage(cid, did) {
    const cl = data.clients.find(x => x.id === cid); if (!cl) return;
    const d = cl.documents.find(x => x.id === did);
    if (d) d.storage = d.storage === 'edo' ? 'paper' : 'edo';
    save(); render();
}

function deleteDoc(cid, did) {
    showConfirm('Удалить документ?', () => {
        const cl = data.clients.find(x => x.id === cid); if (!cl) return;
        cl.documents = cl.documents.filter(x => x.id !== did);
        cl.documents.forEach(d => { if (d.parentId === did) d.parentId = null; });
        save(); render(); toast('Документ удалён');
    });
}

function saveTask(tid) {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { toast('Введите название'); return; }
    const desc = '';
    const clientId = document.getElementById('fClient').value || null;
    const column = document.getElementById('fCol').value;
    const dueDate = document.getElementById('fDue').value || null;
    if (tid) {
        const t = data.tasks.find(x => x.id === tid);
        if (t) { t.title = title; t.description = desc; t.clientId = clientId; t.column = column; t.dueDate = dueDate; }
    } else {
        data.tasks.push({ id:genId('t'), title, description:desc, clientId, column, dueDate, pinned:false, createdAt:new Date().toISOString() });

    save(); closeModal(); render(); toast(tid ? 'Задача обновлена' : 'Задача добавлена');

function cycleTaskStatus(tid) {
    const t = data.tasks.find(x => x.id === tid); if (!t) return;
    const next = { todo:'in_progress', in_progress:'done', done:'todo' };
    t.column = next[t.column] || 'todo';
    save(); render();
}

function togglePin(tid) {
    const t = data.tasks.find(x => x.id === tid); if (!t) return;
    t.pinned = !t.pinned;
    save(); render();
}

function deleteTask(tid) {
    showConfirm('Удалить задачу?', () => {
        data.tasks = data.tasks.filter(x => x.id !== tid);
        save(); render(); toast('Задача удалена');
    });
}

/* ===== DROPDOWN ===== */
function _resetDropdown(d) {
    d.classList.remove('open');
    d.style.left = ''; d.style.top = ''; d.style.visibility = '';
    const c = d.closest('.client-card');
    if (c) c.classList.remove('menu-open');
}
function closeAllDropdowns(except) {
    document.querySelectorAll('.dropdown.open').forEach(d => {
        if (d === except) return;
        _resetDropdown(d);
    });
}
function positionDropdown(btn, dd) {
    // открываем невидимым чтобы измерить, потом ставим у кнопки и держим в пределах вьюпорта
    dd.style.visibility = 'hidden';
    dd.classList.add('open');
    const b = btn.getBoundingClientRect();
    const w = dd.offsetWidth || 200;
    const h = dd.offsetHeight || 80;
    const pad = 8;
    let left = b.right - w;                 // правый край выпадашки под правым краем кнопки
    let top = b.bottom + 4;                 // на 4px ниже кнопки
    if (left < pad) left = pad;
    if (left + w > window.innerWidth - pad) left = Math.max(pad, window.innerWidth - pad - w);
    if (top + h > window.innerHeight - pad) top = b.top - 4 - h;   // не влезает вниз — раскрываем вверх
    if (top < pad) top = pad;
    dd.style.left = left + 'px';
    dd.style.top = top + 'px';
    dd.style.visibility = '';
}
function toggleDD(btn) {
    const dd = btn.nextElementSibling;
    const willOpen = !dd.classList.contains('open');
    closeAllDropdowns(dd);
    if (willOpen) {
        positionDropdown(btn, dd);
        const card = dd.closest('.client-card');
        if (card) card.classList.add('menu-open');
    } else {
        _resetDropdown(dd);
    }
}
document.addEventListener('click', e => {
    if (!e.target.closest('.client-menu-wrap')) closeAllDropdowns();
});
// position:fixed выпадашка не едет за страницей — закрываем при скролле/ресайзе
window.addEventListener('scroll', () => closeAllDropdowns(), true);
window.addEventListener('resize', () => closeAllDropdowns());

/* ===== EXPORT CSV ===== */
function exportToCSV() {
    const rows = [['Контрагент','Тип документа','Описание','Статус','Тип хранения']];
    const typeLabels = { contract:'Договор', amendment:'Доп. соглашение', act:'Итоговый акт' };
    const active = data.clients.filter(c => c.status === 'active');
    active.forEach(c => {
        if (c.documents.length === 0) {
            rows.push([c.name,'','','','']);
            return;
        }
        const { roots, childrenOf } = buildTree(c.documents);
        function addDoc(doc) {
            rows.push([
                c.name,
                typeLabels[doc.type] || doc.type,
                doc.description,
                doc.signed ? 'Подписано' : 'Не подписано',
                doc.storage === 'edo' ? 'ЭДО' : 'Подписи на бумаге'
            ]);
            (childrenOf[doc.id] || []).forEach(ch => addDoc(ch));
        }
        roots.forEach(r => addDoc(r));
    });
    const csv = '\uFEFF' + rows.map(r => r.map(c => '"' + (c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
    const b = new Blob([csv], { type:'text/csv;charset=utf-8' });
    const u = URL.createObjectURL(b);
    const a = document.createElement('a'); a.href = u;
    a.download = `Договора_Эталон_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(u);
    toast('CSV экспортирован — откройте в Google Таблицах');
}

}
